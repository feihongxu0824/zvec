name: Android Cross Build & Test

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      api:
        description: 'Android API level'
        required: false
        default: '21'
        type: string

permissions:
  contents: read

jobs:
  emulator-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Enable KVM
        run: sudo chmod 666 /dev/kvm || true

      - name: Install emulator and system image
        shell: bash
        run: |
          API_LEVEL="${{ github.event.inputs.api || '21' }}"
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-${API_LEVEL}" \
            "emulator"

          sdkmanager --install "system-images;android-${API_LEVEL};google_apis;x86_64" 2>/dev/null || \
          sdkmanager --install "system-images;android-${API_LEVEL};google_apis_playstore;x86_64" 2>/dev/null || \
          sdkmanager --install "system-images;android-${API_LEVEL};default;x86_64"

      - name: Start emulator smoke test
        shell: bash
        run: |
          set -euo pipefail

          API_LEVEL="${{ github.event.inputs.api || '21' }}"
          AVD_NAME="zvec_smoke_api_${API_LEVEL}"
          AVD_HOME="$HOME/.android/avd"
          AVD_DIR="$AVD_HOME/${AVD_NAME}.avd"
          AVD_INI="$AVD_HOME/${AVD_NAME}.ini"
          EMULATOR_LOG="$RUNNER_TEMP/emulator-api-${API_LEVEL}.log"
          export ANDROID_AVD_HOME="$AVD_HOME"

          SYS_IMG=""
          for variant in google_apis google_apis_playstore default; do
            candidate="$ANDROID_HOME/system-images/android-${API_LEVEL}/$variant/x86_64"
            if [ -d "$candidate" ]; then
              SYS_IMG="$candidate"
              break
            fi
          done
          if [ -z "$SYS_IMG" ]; then
            SYS_IMG=$(find "$ANDROID_HOME/system-images" -type d -name "x86_64" 2>/dev/null | head -1 || true)
          fi
          if [ -z "$SYS_IMG" ]; then
            echo "ERROR: No x86_64 system image found"
            exit 1
          fi

          SYS_TAG=$(basename "$(dirname "$SYS_IMG")")
          rm -rf "$AVD_DIR" "$AVD_INI"
          mkdir -p "$AVD_DIR"

          cat > "$AVD_INI" << EOAVD
          avd.ini.encoding=UTF-8
          path=${AVD_DIR}
          path.rel=avd/${AVD_NAME}.avd
          target=android-${API_LEVEL}
          EOAVD

          cat > "$AVD_DIR/config.ini" << EOCFG
          AvdId=${AVD_NAME}
          PlayStore.enabled=false
          abi.type=x86_64
          avd.ini.displayname=${AVD_NAME}
          avd.ini.encoding=UTF-8
          disk.dataPartition.size=8G
          hw.accelerator.isConfigured=true
          hw.cpu.arch=x86_64
          hw.cpu.ncore=4
          hw.lcd.density=420
          hw.lcd.height=1920
          hw.lcd.width=1080
          hw.ramSize=4096
          image.sysdir.1=${SYS_IMG}/
          tag.display=${SYS_TAG}
          tag.id=${SYS_TAG}
          EOCFG

          dump_emulator_diagnostics() {
            echo "AVD home:"
            ls -la "$AVD_HOME" || true
            echo "AVD ini:"
            cat "$AVD_INI" || true
            echo "AVD config:"
            cat "$AVD_DIR/config.ini" || true
            echo "adb devices:"
            adb devices -l || true
            echo "emulator processes:"
            ps -ef | grep -i '[e]mulator' || true
            echo "emulator log tail:"
            tail -200 "$EMULATOR_LOG" || true
          }

          echo "API level: $API_LEVEL"
          echo "System image: $SYS_IMG"
          echo "Available AVDs before launch:"
          "$ANDROID_HOME/emulator/emulator" -list-avds

          "$ANDROID_HOME/emulator/emulator" -avd "$AVD_NAME" \
            -no-window -no-audio -no-boot-anim \
            -gpu swiftshader_indirect \
            -netdelay none -netspeed full \
            -memory 4096 \
            -no-snapshot \
            -wipe-data \
            > "$EMULATOR_LOG" 2>&1 &
          EMULATOR_PID=$!
          trap 'adb emu kill 2>/dev/null || true; kill "$EMULATOR_PID" 2>/dev/null || true' EXIT

          if ! timeout 180 adb wait-for-device; then
            echo "ERROR: Emulator did not become reachable within 180s"
            dump_emulator_diagnostics
            exit 1
          fi

          echo "Waiting for sys.boot_completed..."
          elapsed=0
          while true; do
            booted=$(timeout 15 adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r\n ' || true)
            echo "boot_completed='${booted}' elapsed=${elapsed}s"
            if [ "$booted" = "1" ]; then
              break
            fi
            if [ "$elapsed" -ge 300 ]; then
              echo "ERROR: Emulator failed to boot within 300s"
              dump_emulator_diagnostics
              exit 1
            fi
            sleep 5
            elapsed=$((elapsed + 5))
          done

          echo "Device ABI: $(timeout 15 adb shell getprop ro.product.cpu.abi | tr -d '\r' || true)"
          echo "ABI list  : $(timeout 15 adb shell getprop ro.product.cpu.abilist | tr -d '\r' || true)"
          echo "Android  : $(timeout 15 adb shell getprop ro.build.version.release | tr -d '\r' || true)"
          echo "API      : $(timeout 15 adb shell getprop ro.build.version.sdk | tr -d '\r' || true)"
          echo "Emulator smoke test passed"
